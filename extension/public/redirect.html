<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profilissimo &mdash; handing off&hellip;</title>
  <style>
    /* ---- design tokens (light) ---- */
    :root {
      --vellum:     #FBF7EF;
      --paper:      #F4EFE6;
      --paper-2:    #EBE4D6;
      --chrome:     #E8E0D0;
      --ink:        #14130F;
      --ink-2:      #2B2922;
      --ink-3:      #585348;
      --ink-4:      #8A8472;
      --ink-5:      #B5AE9B;
      --seal-bg:    #14130F;
      --seal-text:  #FBF7EF;
      --rule-soft:  rgba(20,19,15,0.08);
      --rule-10:    rgba(20,19,15,0.10);
      --rule-12:    rgba(20,19,15,0.12);
      --brass:      #8C6A2A;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --vellum:     #1C1A16;
        --paper:      #211E18;
        --paper-2:    #2A2620;
        --chrome:     #171511;
        --ink:        #F1EADB;
        --ink-2:      #DBD4C4;
        --ink-3:      #B0A994;
        --ink-4:      #8A8472;
        --ink-5:      #6E6757;
        --seal-bg:    #F1EADB;
        --seal-text:  #14130F;
        --rule-soft:  rgba(241,234,219,0.07);
        --rule-10:    rgba(241,234,219,0.10);
        --rule-12:    rgba(241,234,219,0.12);
        --brass:      #C49A4E;
      }
    }

    /* ---- reset + page ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter Tight', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ---- browser-chrome mockup card ---- */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--vellum);
      border: 1px solid var(--rule-12);
      border-radius: 14px;
      box-shadow: 0 30px 60px -30px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    /* titlebar strip */
    .card__titlebar {
      background: var(--chrome);
      border-bottom: 1px solid var(--rule-10);
      padding: 9px 14px 0;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .card__traffic {
      display: flex;
      gap: 7px;
      padding: 0 6px 9px;
    }

    .card__traffic span {
      width: 11px;
      height: 11px;
      border-radius: 999px;
    }

    .card__tab {
      background: var(--vellum);
      border-radius: 8px 8px 0 0;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-4);
      border: 1px solid var(--rule-soft);
      border-bottom: none;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
    }

    .card__seal {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: var(--seal-bg);
      color: var(--seal-text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 9px;
      flex-shrink: 0;
    }

    /* body */
    .card__body {
      padding: 62px 48px 66px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* chip row: dots + destination chip with halo */
    .chip-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .chip {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      background: var(--ink-3);
      flex-shrink: 0;
    }

    .chip--dest {
      width: 52px;
      height: 52px;
      font-size: 19px;
      position: relative;
    }

    .chip--dest::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 999px;
      box-shadow: -2px -1px 0 0 #00F0FF, 2px 1px 0 0 #FF2BD6;
      animation: pf-halo 1.6s ease-in-out infinite;
      pointer-events: none;
    }

    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--brass);
      animation: pf-dot 1.1s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.18s; }
    .dots span:nth-child(3) { animation-delay: 0.36s; }

    /* headline */
    .headline {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 22px;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    /* sub-line */
    .subline {
      font-size: 13px;
      color: var(--ink-3);
      line-height: 1.55;
      max-width: 340px;
    }

    .subline code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 12px;
      color: var(--ink-2);
    }

    /* progress bar */
    .progress {
      margin-top: 34px;
      width: 200px;
      height: 3px;
      background: var(--paper-2);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress__bar {
      display: block;
      height: 100%;
      width: 55%;
      background: var(--brass);
      border-radius: 999px;
      animation: pf-progress 1.4s ease-in-out infinite;
    }

    /* fallback/error message */
    .msg {
      margin-top: 18px;
      font-size: 13px;
      color: var(--ink-4);
      display: none;
    }

    .msg:not(:empty) { display: block; }

    /* animations */
    @keyframes pf-dot {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      40%       { opacity: 1;   transform: scale(1); }
    }

    @keyframes pf-halo {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    @keyframes pf-progress {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(80%); }
      100% { transform: translateX(200%); }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- browser-chrome titlebar -->
    <div class="card__titlebar">
      <div class="card__traffic">
        <span style="background:#E0867A;"></span>
        <span style="background:#E7C66A;"></span>
        <span style="background:#94C47D;"></span>
      </div>
      <div class="card__tab">
        <span class="card__seal">p</span>
        profilissimo://handoff
      </div>
    </div>

    <!-- hand-off body -->
    <div class="card__body">
      <div class="chip-row">
        <div class="chip" id="from-chip" aria-hidden="true">p</div>
        <div class="dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="chip chip--dest" id="to-chip" aria-hidden="true">p</div>
      </div>

      <div class="headline" id="headline">Handing off&hellip;</div>

      <div class="subline" id="subline">
        Opening <code id="url-display"></code> in another profile.
      </div>

      <div class="progress">
        <span class="progress__bar"></span>
      </div>

      <p class="msg" id="msg"></p>
    </div>
  </div>

  <script src="redirect.js"></script>
</body>
</html>
