<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profilissimo</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">Profilissimo</h1>
      <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">

        </svg>
      </button>
    </header>

    <div id="setup-prompt" class="setup-prompt hidden">
      <p>Native Messaging Host not connected.</p>
      <p><a href="#" id="setup-link">Set up Profilissimo</a></p>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Loading profiles…</span>
    </div>

    <ul id="profile-list" class="profile-list"></ul>

    <div id="status" class="status hidden"></div>

    <button id="refresh-btn" class="refresh-btn" title="Refresh profiles" aria-label="Refresh profiles">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/>
        <path d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/>
      </svg>
    </button>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
