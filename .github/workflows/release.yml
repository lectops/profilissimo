name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build extension
        run: npm run build:extension

      - name: Build NMH binary
        run: |
          cd native-host && mkdir -p bin
          bun build --compile --target=bun-darwin-arm64 src/main.ts --outfile bin/profilissimo-nmh-darwin-arm64

      - name: Package extension
        run: cd extension/dist && zip -r ../../profilissimo-extension.zip .

      # Tagged push (v*) → create a new versioned release
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            native-host/bin/profilissimo-nmh-darwin-arm64
            profilissimo-extension.zip

      # Push to main → update the rolling "latest" release
      - name: Update latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: true
          body: |
            Automatically built from the latest commit on `main`.

            | File | Description |
            |------|-------------|
            | `profilissimo-nmh-darwin-arm64` | NMH binary for macOS (Apple Silicon) |
            | `profilissimo-extension.zip` | Chrome extension (load as unpacked) |
          files: |
            native-host/bin/profilissimo-nmh-darwin-arm64
            profilissimo-extension.zip
